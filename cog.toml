# cocogitto configuration.
#
# Enforcement: `cog verify` runs as the commit-msg hook (wired in flake.nix).
# Changelog:   regenerate with the anchored range (NOT bare `cog changelog`):
#
#     cog changelog c776e846~1.. > CHANGELOG.md
#
# We deliberately do NOT version-bump or tag (see docs/adr/0001). c776e846 is the
# commit that adopted Conventional Commits; everything before it predates the
# convention and has already been integrated by downstream forks, so the anchor
# pins generation there (the `~1` makes c776e846 itself inclusive). The custom
# template (cog/changelog.tera) renders ONLY breaking changes — the sole thing a
# downstream maintainer must act on (see docs/adr/0002), newest-first.

ignore_merge_commits = true

[changelog]
path = "CHANGELOG.md"
template = "cog/changelog.tera"
remote = "github.com"
repository = ".dotfiles"
owner = "658060"
authors = [
  { signature = "charlotte", username = "658060" },
]

# cocogitto configuration.
#
# Enforcement: `cog verify` runs as the commit-msg hook (wired in flake.nix).
# Changelog:   `cog changelog > CHANGELOG.md` regenerates the changelog.
#
# We deliberately do NOT version-bump or tag (see docs/adr/0001): the changelog
# is read forward from the commit a downstream fork last merged. cocogitto owns
# CHANGELOG.md and regenerates it over the full history; most pre-adoption
# commits aren't Conventional Commits and are skipped (a few old `refactor:`
# ones leak in harmlessly. an accepted trade-off for not tagging an anchor).

ignore_merge_commits = true

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = ".dotfiles"
owner = "658060"
authors = [
  { signature = "charlotte", username = "658060" },
]
